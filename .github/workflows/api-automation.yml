name: API Automation

on:
  push:
    branches:
      - main
      - "qa-automation/**"
      - "qa-automation-*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  api-tests:
    name: Playwright API tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: automation

    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL || vars.API_BASE_URL }}
      WEB_BASE_URL: ${{ secrets.WEB_BASE_URL || vars.WEB_BASE_URL }}
      E2E_TEST_USERNAME: ${{ secrets.E2E_TEST_USERNAME }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: automation/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Show test target
        run: |
          echo "API_BASE_URL=${API_BASE_URL:-http://localhost:4000}"
          echo "WEB_BASE_URL=${WEB_BASE_URL:-http://localhost:3000}"

      - name: Run API preflight
        run: npm run test:preflight

      - name: Run API automation suite
        run: npm run test:api

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: automation/playwright-report/
          if-no-files-found: ignore

      - name: Upload machine-readable test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-api-results
          path: |
            automation/test-results/results.json
            automation/test-results/results.xml
            automation/test-results/**/*.zip
            automation/test-results/**/*.md
          if-no-files-found: ignore
